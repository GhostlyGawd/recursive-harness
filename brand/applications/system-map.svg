<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 620" role="img" aria-labelledby="title desc">
  <title id="title">Recursive Harness system map</title>
  <desc id="desc">Claude Code events flow through guarded procedures into private state and review gates, producing reviewed repository memory.</desc>
  <defs><marker id="arrow" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto"><path d="M0 0 9 4.5 0 9Z" fill="#20D9FF"/></marker></defs>
  <rect width="1400" height="620" rx="26" fill="#020611"/>
  <g font-family="Arial, system-ui, sans-serif">
    <text x="70" y="74" fill="#EAFBFF" font-size="30" font-weight="700">System map</text>
    <text x="70" y="106" fill="#83A8C5" font-size="17">Conceptual architecture · runtime evidence is shown separately</text>
    <g text-anchor="middle">
      <g><rect x="70" y="164" width="280" height="146" rx="16" fill="#07142B" stroke="#20D9FF" stroke-width="2"/><text x="210" y="220" fill="#EAFBFF" font-size="20" font-weight="700">Claude Code events</text><text x="210" y="262" fill="#83A8C5" font-size="15">session · tools · stop</text></g>
      <g><rect x="390" y="164" width="280" height="146" rx="16" fill="#07142B" stroke="#123CFF" stroke-width="2"/><text x="530" y="220" fill="#EAFBFF" font-size="20" font-weight="700">Hooks + procedures</text><text x="530" y="262" fill="#83A8C5" font-size="15">guards · skills · commands</text></g>
      <g><rect x="710" y="164" width="280" height="146" rx="16" fill="#07142B" stroke="#8A6CFF" stroke-width="2"/><text x="850" y="220" fill="#EAFBFF" font-size="20" font-weight="700">Private hot state</text><text x="850" y="262" fill="#83A8C5" font-size="15">predictions · corrections · fleet</text></g>
      <g><rect x="1030" y="164" width="300" height="146" rx="16" fill="#07142B" stroke="#20D9FF" stroke-width="2"/><text x="1180" y="220" fill="#EAFBFF" font-size="20" font-weight="700">Review gates</text><text x="1180" y="262" fill="#83A8C5" font-size="15">lint · tests · evals · CodeQL</text></g>
    </g>
    <g stroke="#20D9FF" stroke-width="3" fill="none" marker-end="url(#arrow)"><path d="M350 237H382"/><path d="M670 237H702"/><path d="M990 237H1022"/></g>
    <rect x="350" y="418" width="700" height="126" rx="63" fill="#07142B" stroke="#2B6F9F" stroke-width="2"/>
    <text x="700" y="472" fill="#EAFBFF" font-size="24" text-anchor="middle" font-weight="700">Reviewed repository memory</text>
    <text x="700" y="510" fill="#83A8C5" font-size="16" text-anchor="middle">skills · decisions · evals · proposals · guardrails</text>
    <path d="M1180 310V354C1180 380 1080 400 1042 432" fill="none" stroke="#20D9FF" stroke-width="3" marker-end="url(#arrow)"/>
    <path d="M358 474C270 466 210 410 210 318" fill="none" stroke="#20D9FF" stroke-width="3" marker-end="url(#arrow)"/>
  </g>
</svg>
