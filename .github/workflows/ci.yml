name: harness-ci
# Supply-chain provenance: official GitHub release tags reviewed 2026-07-17;
# Dependabot proposes future SHA/comment updates for human review.
# CI is pure Python by design (ADR 0003): no Claude invocation, headless or
# otherwise, ever. Regression REPLAY happens in interactive sessions via the
# /run-evals command; /harness-pr requires its report for enforcement diffs.
on:
  push: {branches: [main]}
  pull_request:
permissions:
  contents: read
jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        # fetch-depth: 0 pulls FULL history (not a shallow clone): cartograph's
        # test_diff.py walks real commit history, so a shallow checkout fails it.
        with: {fetch-depth: 0}
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with: {python-version: "3.12"}
      # `if: ${{ !cancelled() }}` on every test step so ONE CI run surfaces the FULL
      # failure set, not just the first red step. GitHub stops at the first failed
      # step by default, which hid a 3-deep cascade and surfaced it one PR at a time
      # (follow-up 833c47). !cancelled() keeps each step running unless the run is
      # cancelled; the job still goes red if any step fails. Checkout/setup-python
      # stay unguarded — they are prerequisites, not tests.
      - name: Harness self-lint (budgets, falsifiability, autonomy firewall)
        if: ${{ !cancelled() }}
        run: python3 lint/lint_harness.py
      - name: Proposal lifecycle and transition tests
        if: ${{ !cancelled() }}
        run: |
          python3 proposals/manage.py check --base origin/main
          python3 tests/test_proposals.py
      - name: Hook behavior tests
        if: ${{ !cancelled() }}
        run: |
          python3 tests/test_hooks.py
          python3 tests/test_post_merge_return_to_trunk.py
          python3 tests/test_pre_merge_ci_gate.py
          python3 skills/guard/test_guard.py
      - name: Kernel-injection & session-start hook tests
        if: ${{ !cancelled() }}
        run: |
          python3 tests/test_inject_kernel.py
          python3 tests/test_session_start_autoact.py
      - name: Concurrency guard tests (worktree isolation + session, trunk-lease, git-worktree safety)
        if: ${{ !cancelled() }}
        run: |
          python3 tests/test_guard_worktree_isolation.py
          python3 tests/test_guard_worktree_session.py
          python3 tests/test_guard_trunk_lease.py
          python3 tests/test_guard_git_worktree_safety.py
      - name: Worktree-repo materialization tests
        if: ${{ !cancelled() }}
        run: python3 tests/test_materialize_worktree_repos.py
      - name: Feature-flag layer tests (ADR 0008)
        if: ${{ !cancelled() }}
        run: |
          python3 tests/test_features.py
          python3 tests/test_feature_flag_drift.py
      - name: Retro-completion ledger tests
        if: ${{ !cancelled() }}
        run: python3 tests/test_retro_done.py
      - name: Harness state-dir, command-recipe, settings-parity & CI-coverage consistency tests
        if: ${{ !cancelled() }}
        run: |
          python3 tests/test_harness_state_dir.py
          python3 tests/test_command_refresh_recipe.py
          python3 tests/test_settings_parity.py
          python3 tests/test_distribution.py
          python3 tests/test_distribution_completion_specs.py
          python3 tests/test_codex_consumer_acceptance.py
          python3 tests/test_learn_package.py
          python3 tests/test_verify_package.py
          python3 tests/test_coordinate_package.py
          python3 tests/test_lab_package.py
          python3 tests/test_release_acceptance.py
          python3 tests/test_codeql_path_boundaries.py
          python3 tests/test_operator_journeys.py
          python3 tests/test_ci_coverage.py
          python3 tests/test_followup.py
          python3 tests/test_gc_rollup.py
          python3 tests/test_private_state.py
      - name: Subsystem tests (fleet event-log, mission-control, auto-healer, specialization)
        if: ${{ !cancelled() }}
        run: |
          python3 fleet/test_eventlog.py
          python3 fleet/test_claims.py
          python3 fleet/test_units.py
          python3 fleet/test_postbox.py
          python3 fleet/test_render.py
          python3 fleet/test_cli.py
          python3 fleet/test_extraction.py
          python3 mission_control/test_smoke.py
          python3 mission_control/test_console.py
          python3 mission_control/test_feed.py
          python3 mission_control/test_graph.py
          python3 mission_control/test_robustness.py
          python3 skills/auto-healer/test_heal.py
          python3 skills/specialization/test_needs.py
      - name: Mission Control gated-bundle tests (P5 guard, P4 reaper, mission-control verb)
        if: ${{ !cancelled() }}
        run: |
          python3 tests/test_forbid_scratchpad.py
          python3 tests/test_reaper.py
          python3 tests/test_subcommand.py
      - name: Eval corpus structure
        if: ${{ !cancelled() }}
        run: python3 evals/run_evals.py --dry-run
      - name: Cartograph structural-rot gate (Part B) + full test suite
        if: ${{ !cancelled() }}
        run: |
          python3 cartograph/extract.py --check
          python3 cartograph/test_gate.py
          python3 cartograph/test_artifacts.py
          python3 cartograph/test_query.py
          python3 cartograph/test_diff.py
          python3 cartograph/test_audit.py
          python3 cartograph/test_hardening.py
          python3 cartograph/test_spec.py
          python3 cartograph/test_spec_gate.py
          python3 cartograph/test_mission.py
          python3 cartograph/test_atlas.py

  # provenance: 2026-07-17 security/productization review — make the documented
  # Windows distribution contract continuously reproducible under both PS runtimes.
  windows-distribution:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with: {python-version: "3.12"}
      - name: Installer and launcher smoke tests
        run: |
          python tests/test_distribution.py
          python tests/test_learn_package.py
          python tests/test_verify_package.py
          python tests/test_coordinate_package.py
          python tests/test_lab_package.py
          python tests/test_release_acceptance.py
          python tests/test_codeql_path_boundaries.py
      - name: Session-store cutover under Windows PowerShell 5.1
        shell: powershell
        run: |
          # Hosted runners put TEMP on the D: work volume, where Windows PowerShell 5.1
          # rejects junction creation. Exercise reparse-point behavior on the user temp volume.
          $env:TEMP = Join-Path $env:LOCALAPPDATA 'Temp'
          $env:TMP = $env:TEMP
          New-Item -ItemType Directory -Path $env:TEMP -Force | Out-Null
          powershell -NoProfile -ExecutionPolicy Bypass -File tests\test-sync-account-sessions.ps1 -Runtime powershell
      - name: Session-store cutover under PowerShell 7
        shell: pwsh
        run: |
          $env:TEMP = Join-Path $env:LOCALAPPDATA 'Temp'
          $env:TMP = $env:TEMP
          New-Item -ItemType Directory -Path $env:TEMP -Force | Out-Null
          pwsh -NoProfile -ExecutionPolicy Bypass -File tests\test-sync-account-sessions.ps1 -Runtime pwsh

  macos-distribution:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with: {fetch-depth: 0}
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with: {python-version: "3.12"}
      - name: Distribution and complete operator journeys
        run: |
          python3 tests/test_distribution.py
          python3 tests/test_learn_package.py
          python3 tests/test_verify_package.py
          python3 tests/test_coordinate_package.py
          python3 tests/test_lab_package.py
          python3 tests/test_release_acceptance.py
          python3 tests/test_codeql_path_boundaries.py
          python3 tests/test_operator_journeys.py
          python3 tests/test_materialize_worktree_repos.py

  minimum-git:
    runs-on: ubuntu-latest
    env:
      GIT_VERSION: "2.39.0"
      GIT_SOURCE_SHA256: "ba199b13fb5a99ca3dec917b0bd736bc0eb5a9df87737d435eddfdf10d69265b"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with: {fetch-depth: 0}
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with: {python-version: "3.12"}
      - name: Build the documented minimum Git from its checksummed source
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends build-essential libcurl4-gnutls-dev libexpat1-dev libssl-dev zlib1g-dev
          curl --fail --location --proto '=https' --tlsv1.2 --output "$RUNNER_TEMP/git.tar.xz" \
            "https://www.kernel.org/pub/software/scm/git/git-$GIT_VERSION.tar.xz"
          echo "$GIT_SOURCE_SHA256  $RUNNER_TEMP/git.tar.xz" | sha256sum --check --strict
          tar -C "$RUNNER_TEMP" -xf "$RUNNER_TEMP/git.tar.xz"
          make -C "$RUNNER_TEMP/git-$GIT_VERSION" -j2 \
            prefix="$RUNNER_TEMP/git-min" NO_GETTEXT=YesPlease NO_TCLTK=YesPlease all install
          echo "$RUNNER_TEMP/git-min/bin" >> "$GITHUB_PATH"
      - name: Exercise Git-facing distribution at the exact lower bound
        run: |
          test "$(git --version)" = "git version $GIT_VERSION"
          python3 tests/test_distribution.py
          python3 tests/test_materialize_worktree_repos.py
          python3 tests/test_operator_journeys.py

  optional-surfaces:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with: {python-version: "3.12"}
      - name: Install reviewed optional dependency snapshots
        run: python3 -m pip install -r mission_control/requirements.txt -r fleet/requirements-mcp.txt
      - name: MCP adapter and full Mission Control UI
        run: |
          python3 fleet/test_mcp.py
          python3 mission_control/test_smoke.py
          python3 mission_control/test_console.py
          python3 mission_control/test_feed.py
          python3 mission_control/test_graph.py
          python3 mission_control/test_robustness.py
